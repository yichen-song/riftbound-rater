<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riftbound · 单卡评级</title>
<link rel="stylesheet" href="style.css?v=3f40d87">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">

<!-- ── 登录界面 ── -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">RIFTBOUND<small>CARD RATER</small></div>
    <div class="auth-sub">评级工具 · 请登录以继续</div>
    <div class="mf">
      <label>邮箱</label>
      <input type="email" id="authEmail" placeholder="your@email.com" autocomplete="email" />
    </div>
    <div class="mf">
      <label>密码</label>
      <input type="password" id="authPassword" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div class="auth-err" id="authErr"></div>
    <button class="btn btn-gold" id="authBtn" onclick="doLogin()" style="width:100%;margin-top:6px">登录</button>
  </div>
</div>

<!-- ── 主界面 ── -->
<div class="main-screen" id="mainScreen" style="display:none">

<!-- Header -->
<header>
  <div class="logo">RIFTBOUND<small>CARD RATER</small></div>

  <!-- 赛制切换 -->
  <div class="header-center">
    <span class="hc-label">赛制</span>
    <div class="format-toggle" id="formatToggle">
      <button class="fmt-btn active" id="fBtnC" onclick="switchFormat('constructed')">构筑</button>
      <button class="fmt-btn"        id="fBtnL" onclick="switchFormat('limited')">限制</button>
    </div>
  </div>

  <div class="header-right">
    <div class="sync-pill">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">连接中…</span>
    </div>
    <div class="user-pill" id="userPill">
      <span class="user-pill-name" id="userPillName"
        onclick="editDisplayName()" title="点击修改昵称" style="cursor:pointer">—</span>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">退出</button>
    </div>
    <a href="scraper.html" class="btn btn-ghost btn-sm" style="text-decoration:none">🔧 爬虫工具</a>
    <button class="btn btn-ghost btn-sm" onclick="openStats()">📊 统计</button>
    <button class="btn btn-ghost btn-sm" onclick="openImport()">导入卡牌</button>
    <button class="btn btn-ghost btn-sm" onclick="openCompare()">⚖ 对比</button>
    <button class="btn btn-danger btn-sm" onclick="clearTab()">清空此页</button>
  </div>
</header>

<!-- Tabs -->
<div class="tab-bar" id="tabBar"></div>

<!-- Main -->
<div class="main">
  <div class="sidebar">

    <div class="prog-wrap">
      <div class="prog-hd"><span id="progLabel">全局进度</span><span id="progPct">0%</span></div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>

    <!-- 评级说明（按赛制动态渲染）-->
    <div class="sb-title" style="padding:10px 13px 0">评级说明</div>
    <div class="legend" id="legendPanel"></div>

    <div class="sb-stats" id="sbStats"></div>
  </div>

  <!-- Cards -->
  <div id="cardArea" class="card-area">
    <div class="filter-row" id="filterRow"></div>
    <div class="card-grid" id="cardGrid"></div>
  </div>

  <!-- Compare -->
  <div id="cmpArea" class="cmp-area" style="display:none"></div>
</div>

</div><!-- /main-screen -->
</div><!-- /app -->

<!-- ── Import Modal ── -->
<div class="overlay" id="importOv">
  <div class="modal">
    <div class="modal-title">导入卡牌</div>
    <div class="mf">
      <label>选择 scraper 导出的 JSON 文件</label>
      <input type="file" id="jsonFile" accept=".json"
        style="background:none;border:none;padding:0;color:var(--text-mid);font-size:12px"
        onchange="previewJson()" />
      <div class="hint">
        格式：scraper 导出的平铺数组，以 <b>cardNo</b> 为唯一标识去重。<br>
        已有卡牌（同 cardNo）自动跳过，不覆盖现有评级。
      </div>
    </div>
    <div class="import-result" id="jsonResult"></div>
    <div class="m-btns">
      <button class="btn btn-ghost" onclick="closeImport()">取消</button>
      <button class="btn btn-gold"  onclick="doJsonImport()">导入</button>
    </div>
  </div>
</div>

<!-- ── Compare Modal ── -->
<div class="overlay" id="cmpOv">
  <div class="modal">
    <div class="modal-title">⚖ 评级对比</div>
    <div class="hint" style="margin-bottom:12px">
      展示所有玩家在当前赛制下的评级，高亮显示差异项。
    </div>
    <div class="mf">
      <label>对比赛制</label>
      <select id="cmpFormat">
        <option value="constructed">构筑赛</option>
        <option value="limited">限制赛</option>
      </select>
    </div>
    <div class="m-btns">
      <button class="btn btn-ghost" onclick="closeCmp()">关闭</button>
      <button class="btn btn-gold"  onclick="startCompare()">开始对比</button>
    </div>
  </div>
</div>

<!-- ── Stats Modal ── -->
<div class="overlay" id="statsOv">
  <div class="modal modal-wide">
    <div class="modal-title">📊 评级统计</div>
    <div class="stats-format-row">
      <span class="hc-label">赛制</span>
      <div class="format-toggle">
        <button class="fmt-btn active" id="stFmtC" onclick="switchStatsFormat('constructed')">构筑</button>
        <button class="fmt-btn"        id="stFmtL" onclick="switchStatsFormat('limited')">限制</button>
      </div>
    </div>
    <div id="statsContent"></div>
    <div class="m-btns" style="margin-top:14px">
      <button class="btn btn-ghost" onclick="closeStats()">关闭</button>
    </div>
  </div>
</div>

<!-- ── Lightbox ── -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lb-inner" id="lbInner">
    <button class="lb-close" onclick="closeLightbox()">×</button>
    <div id="lbContent"></div>
    <div class="lb-name" id="lbName"></div>
    <div class="lb-meta" id="lbMeta"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js?v=3f40d87"></script>
</body>
</html>
