<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riftbound · 单卡评级</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">

<!-- ── 登录界面 ── -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">RIFTBOUND<small>CARD RATER</small></div>
    <div class="auth-sub">评级工具 · 请登录以继续</div>
    <div class="mf">
      <label>邮箱</label>
      <input type="email" id="authEmail" placeholder="your@email.com" autocomplete="email" />
    </div>
    <div class="mf">
      <label>密码</label>
      <input type="password" id="authPassword" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div class="auth-err" id="authErr"></div>
    <button class="btn btn-gold" id="authBtn" onclick="doLogin()" style="width:100%;margin-top:6px">登录</button>
  </div>
</div>

<!-- ── 主界面 ── -->
<div class="main-screen" id="mainScreen" style="display:none">

<!-- Header -->
<header>
  <div class="logo">RIFTBOUND<small>CARD RATER</small></div>

  <!-- 赛制切换 -->
  <div class="header-center">
    <span class="hc-label">赛制</span>
    <div class="format-toggle" id="formatToggle">
      <button class="fmt-btn active" id="fBtnC" onclick="switchFormat('constructed')">构筑</button>
      <button class="fmt-btn"        id="fBtnL" onclick="switchFormat('limited')">限制</button>
    </div>
  </div>

  <div class="header-right">
    <!-- 同步状态 -->
    <div class="sync-pill">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">连接中…</span>
    </div>
    <!-- 当前用户 -->
    <div class="user-pill" id="userPill">
      <span class="user-pill-name" id="userPillName">—</span>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">退出</button>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="openImport()">导入卡牌</button>
    <button class="btn btn-ghost btn-sm" onclick="openCompare()">⚖ 对比</button>
    <button class="btn btn-danger btn-sm" onclick="clearTab()">清空此页</button>
  </div>
</header>

<!-- Tabs -->
<div class="tab-bar" id="tabBar"></div>

<!-- Main -->
<div class="main">
  <div class="sidebar">

    <div class="sb-sec">
      <div class="sb-title">添加单卡</div>
      <div class="add-form">
        <input type="text" id="inName" placeholder="卡牌名称 *" />
        <input type="url"  id="inImg"  placeholder="卡图 URL（可选）" />
        <select id="inCardType" onchange="onCardTypeChange()">
          <option value="">— 选择类型 *—</option>
          <option value="legend">传奇</option>
          <option value="battlefield">战场</option>
          <option value="spell">普通牌</option>
        </select>
        <div id="inDomainsRow" style="display:none">
          <div class="add-form-label">特性（可多选）</div>
          <div id="inDomains" class="domain-checks">
            <label><input type="checkbox" value="炽烈"><span style="color:#e05252">炽烈</span></label>
            <label><input type="checkbox" value="翠意"><span style="color:#52b96e">翠意</span></label>
            <label><input type="checkbox" value="灵光"><span style="color:#5b9fe0">灵光</span></label>
            <label><input type="checkbox" value="摧破"><span style="color:#e07d30">摧破</span></label>
            <label><input type="checkbox" value="混沌"><span style="color:#9b6de0">混沌</span></label>
            <label><input type="checkbox" value="序理"><span style="color:#d4b935">序理</span></label>
          </div>
        </div>
        <button class="btn btn-gold" onclick="addCard()" style="width:100%;margin-top:2px">+ 添加</button>
      </div>
    </div>

    <div class="prog-wrap">
      <div class="prog-hd"><span id="progLabel">当前页进度</span><span id="progPct">0%</span></div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>

    <!-- 赛制说明（由 JS 按当前赛制动态渲染） -->
    <div class="sb-title" style="padding:10px 13px 0">评级说明</div>
    <div class="legend" id="legendPanel">
      <!-- 由 renderLegend() 填充 -->
    </div>

    <div class="sb-stats" id="sbStats"></div>
  </div>

  <!-- Cards -->
  <div id="cardArea" class="card-area">
    <div class="filter-row" id="filterRow"></div>
    <div class="card-grid" id="cardGrid"></div>
  </div>

  <!-- Compare -->
  <div id="cmpArea" class="cmp-area" style="display:none"></div>
</div>

</div><!-- /main-screen -->
</div><!-- /app -->

<!-- ── Import Modal ── -->
<div class="overlay" id="importOv">
  <div class="modal">
    <div class="modal-title">导入卡牌</div>
    <div class="import-modes">
      <div class="imode-btn active" id="iModeJson" onclick="switchImportMode('json')">📄 JSON 文件</div>
      <div class="imode-btn"         id="iModeText" onclick="switchImportMode('text')">✏ 手动文本</div>
    </div>

    <!-- JSON file mode -->
    <div class="imode-panel active" id="iPanelJson">
      <div class="mf">
        <label>选择 JSON 文件</label>
        <input type="file" id="jsonFile" accept=".json"
          style="background:none;border:none;padding:0;color:var(--text-mid);font-size:12px"
          onchange="previewJson()" />
        <div class="hint">
          支持格式：<b>{"tab名": [{"name":"…","img":"…","card_type":"…","domains":["炽烈"]}]}</b><br>
          已有卡牌（同名同 Tab）自动跳过，不覆盖现有评级。
        </div>
      </div>
      <div class="import-result" id="jsonResult"></div>
      <div class="m-btns">
        <button class="btn btn-ghost" onclick="closeImport()">取消</button>
        <button class="btn btn-gold"  onclick="doJsonImport()">导入</button>
      </div>
    </div>

    <!-- Text mode -->
    <div class="imode-panel" id="iPanelText">
      <div class="mf">
        <label>每行一张（导入到当前 Tab）</label>
        <textarea id="bulkTxt" placeholder="月之降临&#10;https://example.com/card.png&#10;皎月护卫|https://example.com/card2.png"></textarea>
        <div class="hint">格式：<b>卡名</b> / <b>图片URL</b> / <b>卡名|图片URL</b>，重复卡名自动跳过。</div>
      </div>
      <div class="m-btns">
        <button class="btn btn-ghost" onclick="closeImport()">取消</button>
        <button class="btn btn-gold"  onclick="doBulkImport()">导入</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Compare Modal ── -->
<div class="overlay" id="cmpOv">
  <div class="modal">
    <div class="modal-title">⚖ 评级对比</div>
    <div class="hint" style="margin-bottom:12px">
      展示所有玩家在当前赛制下的评级，高亮显示差异项。
    </div>
    <div class="mf">
      <label>对比赛制</label>
      <select id="cmpFormat">
        <option value="constructed">构筑赛</option>
        <option value="limited">限制赛</option>
      </select>
    </div>
    <div class="m-btns">
      <button class="btn btn-ghost" onclick="closeCmp()">关闭</button>
      <button class="btn btn-gold"  onclick="startCompare()">开始对比</button>
    </div>
  </div>
</div>

<!-- ── Lightbox ── -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lb-inner" id="lbInner">
    <button class="lb-close" onclick="closeLightbox()">×</button>
    <div id="lbContent"></div>
    <div class="lb-name"   id="lbName"></div>
    <div class="lb-meta"   id="lbMeta"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
